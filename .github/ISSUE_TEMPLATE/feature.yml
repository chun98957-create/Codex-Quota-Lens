name: Feature request
description: Propose a scoped improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What decision or workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Data and privacy impact
      description: What new data would this feature read, store, or transmit?
    validations:
      required: true

