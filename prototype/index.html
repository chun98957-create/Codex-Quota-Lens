  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;quota-lens-demo&#x27;);
      if (!root || root.dataset.ready === &#x27;true&#x27;) return;
      root.dataset.ready = &#x27;true&#x27;;

      const initialQuota = [82,81,81,80,79,78,78,77,75,74,72,71,70,69,68,66,65,64,63,62,61,60,59,58];
      let quota = initialQuota.slice();
      let remaining = quota[quota.length - 1];
      const resetAt = Date.now() + ((3 * 60 + 24) * 60 * 1000);

      const clamp = (n, min, max) =&gt; Math.max(min, Math.min(max, n));
      const fmt1 = n =&gt; Number(n).toFixed(1);

      root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(button =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          const view = button.dataset.view;
          root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(peer =&gt; {
            const active = peer === button;
            peer.classList.toggle(&#x27;is-selected&#x27;, active);
            peer.setAttribute(&#x27;aria-selected&#x27;, String(active));
          });
          root.querySelectorAll(&#x27;.ql-view&#x27;).forEach(panel =&gt; {
            panel.hidden = panel.id !== `ql-${view}`;
          });
        });
      });

      function renderChart() {
        const svg = root.querySelector(&#x27;#ql-quota-chart&#x27;);
        const grid = root.querySelector(&#x27;#ql-grid&#x27;);
        const width = 720;
        const height = 270;
        const left = 42;
        const right = 22;
        const top = 22;
        const bottom = 38;
        const plotW = width - left - right;
        const plotH = height - top - bottom;
        const x = i =&gt; left + (plotW * i / (quota.length - 1));
        const y = value =&gt; top + ((100 - value) / 100) * plotH;
        const points = quota.map((value, i) =&gt; `${x(i)},${y(value)}`).join(&#x27; &#x27;);
        const area = `${left},${top + plotH} ${points} ${x(quota.length - 1)},${top + plotH}`;

        grid.innerHTML = &#x27;&#x27;;
        [100,75,50,25,0].forEach(value =&gt; {
          const yy = y(value);
          grid.insertAdjacentHTML(&#x27;beforeend&#x27;, `&lt;line class=&quot;ql-gridline&quot; x1=&quot;${left}&quot; y1=&quot;${yy}&quot; x2=&quot;${left + plotW}&quot; y2=&quot;${yy}&quot;&gt;&lt;/line&gt;&lt;text class=&quot;ql-axis-text text-small&quot; x=&quot;${left - 8}&quot; y=&quot;${yy + 4}&quot; text-anchor=&quot;end&quot;&gt;${value}%&lt;/text&gt;`);
        });
        [[&#x27;24h&#x27;,0],[&#x27;18h&#x27;,.25],[&#x27;12h&#x27;,.5],[&#x27;6h&#x27;,.75],[&#x27;现在&#x27;,1]].forEach(([label, ratio]) =&gt; {
          const xx = left + plotW * ratio;
          grid.insertAdjacentHTML(&#x27;beforeend&#x27;, `&lt;text class=&quot;ql-axis-text text-small&quot; x=&quot;${xx}&quot; y=&quot;${height - 10}&quot; text-anchor=&quot;middle&quot;&gt;${label}&lt;/text&gt;`);
        });
        root.querySelector(&#x27;#ql-area-path&#x27;).setAttribute(&#x27;d&#x27;, `M ${area.replaceAll(&#x27; &#x27;, &#x27; L &#x27;)} Z`);
        root.querySelector(&#x27;#ql-line-path&#x27;).setAttribute(&#x27;d&#x27;, `M ${points.replaceAll(&#x27; &#x27;, &#x27; L &#x27;)}`);
        const budgetStart = quota[0];
        const budgetEnd = 65;
        root.querySelector(&#x27;#ql-budget-path&#x27;).setAttribute(&#x27;d&#x27;, `M ${left},${y(budgetStart)} L ${left + plotW},${y(budgetEnd)}`);
        const dot = root.querySelector(&#x27;#ql-current-dot&#x27;);
        dot.setAttribute(&#x27;cx&#x27;, x(quota.length - 1));
        dot.setAttribute(&#x27;cy&#x27;, y(remaining));
        const label = root.querySelector(&#x27;#ql-current-label&#x27;);
        label.setAttribute(&#x27;x&#x27;, x(quota.length - 1) - 10);
        label.setAttribute(&#x27;y&#x27;, y(remaining) - 12);
        label.textContent = `${remaining}%`;
        svg.querySelector(&#x27;desc&#x27;).textContent = `剩余额度从 ${quota[0]}% 下降至 ${remaining}%，近期下降速度高于预算线。`;
      }

      function updateOverview() {
        root.querySelector(&#x27;#ql-remaining&#x27;).textContent = `${remaining}%`;
        root.querySelector(&#x27;#ql-used-label&#x27;).textContent = `本窗口已使用 ${100 - remaining}%`;
        const burn = remaining &lt; 55 ? 8.1 : 6.8;
        root.querySelector(&#x27;#ql-burn&#x27;).textContent = `${fmt1(burn)}%/h`;
        const delta = Math.round((burn / 4.1 - 1) * 100);
        root.querySelector(&#x27;#ql-insight-text&#x27;).textContent = `你目前比预算速度快 ${delta}%。把常规任务切到 Mini + 中等推理，可提高坚持到重置的概率。`;
        root.querySelector(&#x27;#ql-forecast&#x27;).textContent = remaining &lt; 55 ? &#x27;当前速度可能提前 1h 42m 用完&#x27; : &#x27;当前速度可能提前 1h 08m 用完&#x27;;
        renderChart();
      }

      root.querySelector(&#x27;#ql-simulate&#x27;).addEventListener(&#x27;click&#x27;, event =&gt; {
        const button = event.currentTarget;
        button.disabled = true;
        button.textContent = &#x27;任务运行中…&#x27;;
        setTimeout(() =&gt; {
          const cost = 2 + Math.floor(Math.random() * 3);
          remaining = clamp(remaining - cost, 0, 100);
          quota = quota.slice(1).concat(remaining);
          root.querySelector(&#x27;#ql-token-mix&#x27;).textContent = `刚刚任务：输入 ${38 + cost * 3}k · 缓存 ${27 + cost}k · 输出 ${6 + cost}k · 推理 ${2 + cost}k tokens`;
          updateOverview();
          button.disabled = false;
          button.innerHTML = &#x27;&lt;i data-lucide=&quot;play&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;再模拟一次任务&#x27;;
          if (globalThis.lucide) globalThis.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        }, 650);
      });

      function updateCountdown() {
        const seconds = Math.max(0, Math.floor((resetAt - Date.now()) / 1000));
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        root.querySelector(&#x27;#ql-reset&#x27;).textContent = `${h}:${String(m).padStart(2,&#x27;0&#x27;)}:${String(s).padStart(2,&#x27;0&#x27;)}`;
      }

      const days = [&#x27;一&#x27;,&#x27;二&#x27;,&#x27;三&#x27;,&#x27;四&#x27;,&#x27;五&#x27;,&#x27;六&#x27;,&#x27;日&#x27;];
      const hours = [&#x27;09&#x27;,&#x27;12&#x27;,&#x27;15&#x27;,&#x27;18&#x27;,&#x27;21&#x27;,&#x27;24&#x27;];
      const heat = [
        [2.1,3.2,2.8,3.6,4.1,1.4,1.1],
        [3.5,4.6,5.2,4.1,6.2,2.0,1.6],
        [4.2,6.8,5.7,6.1,7.4,3.2,2.7],
        [5.1,7.9,8.6,6.9,9.2,4.8,3.5],
        [6.2,8.5,12.4,7.8,10.1,5.4,4.1],
        [2.8,3.1,5.9,4.2,5.1,3.8,2.3]
      ];
      const heatmap = root.querySelector(&#x27;#ql-heatmap&#x27;);
      heatmap.insertAdjacentHTML(&#x27;beforeend&#x27;, &#x27;&lt;span&gt;&lt;/span&gt;&#x27;);
      days.forEach(day =&gt; heatmap.insertAdjacentHTML(&#x27;beforeend&#x27;, `&lt;span class=&quot;ql-heat-label text-small text-muted&quot;&gt;周${day}&lt;/span&gt;`));
      hours.forEach((hour, row) =&gt; {
        heatmap.insertAdjacentHTML(&#x27;beforeend&#x27;, `&lt;span class=&quot;ql-heat-label text-small text-muted&quot;&gt;${hour}:00&lt;/span&gt;`);
        heat[row].forEach((value, col) =&gt; {
          const selected = row === 4 &amp;&amp; col === 2;
          const intensity = Math.round(12 + value * 6);
          heatmap.insertAdjacentHTML(&#x27;beforeend&#x27;, `&lt;button type=&quot;button&quot; class=&quot;btn viz-tile ql-heat-cell${selected ? &#x27; is-selected&#x27; : &#x27;&#x27;}&quot; style=&quot;--heat:${intensity}%&quot; aria-label=&quot;周${days[col]} ${hour}:00，${value}% 每小时&quot; aria-pressed=&quot;${selected}&quot;&gt;${value}&lt;/button&gt;`);
        });
      });
      heatmap.querySelectorAll(&#x27;.ql-heat-cell&#x27;).forEach(cell =&gt; {
        cell.addEventListener(&#x27;click&#x27;, () =&gt; {
          heatmap.querySelectorAll(&#x27;.ql-heat-cell&#x27;).forEach(peer =&gt; {
            const active = peer === cell;
            peer.classList.toggle(&#x27;is-selected&#x27;, active);
            peer.setAttribute(&#x27;aria-pressed&#x27;, String(active));
          });
          const label = cell.getAttribute(&#x27;aria-label&#x27;).replace(&#x27;，&#x27;, &#x27; · &#x27;);
          const causes = Number(cell.textContent) &gt; 8 ? &#x27;高推理或长上下文任务集中&#x27; : &#x27;常规编码任务为主&#x27;;
          root.querySelector(&#x27;#ql-heat-detail&#x27;).innerHTML = `&lt;span&gt;已选择：${label}&lt;/span&gt;&lt;span class=&quot;text-muted&quot;&gt;${causes}&lt;/span&gt;`;
        });
      });

      const fastest = [
        [&#x27;周三 20:45–21:15&#x27;,12.4,&#x27;高推理调试&#x27;],
        [&#x27;周五 20:30–21:00&#x27;,10.1,&#x27;长上下文重构&#x27;],
        [&#x27;周五 17:45–18:15&#x27;,9.2,&#x27;并行任务&#x27;]
      ];
      const speedList = root.querySelector(&#x27;#ql-speed-list&#x27;);
      fastest.forEach(([label,value,cause]) =&gt; {
        speedList.insertAdjacentHTML(&#x27;beforeend&#x27;, `&lt;div class=&quot;ql-speed-row&quot;&gt;&lt;div&gt;&lt;div&gt;${label}&lt;/div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;${cause}&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;ql-bar-track&quot; aria-hidden=&quot;true&quot;&gt;&lt;div class=&quot;ql-bar-fill&quot; style=&quot;width:${value / 12.4 * 100}%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;strong&gt;${value}%/h&lt;/strong&gt;&lt;/div&gt;`);
      });

      const model = root.querySelector(&#x27;#ql-model&#x27;);
      const effort = root.querySelector(&#x27;#ql-effort&#x27;);
      const tasks = root.querySelector(&#x27;#ql-tasks&#x27;);
      const size = root.querySelector(&#x27;#ql-size&#x27;);
      const sizeLabels = [&#x27;很小&#x27;,&#x27;较小&#x27;,&#x27;常规&#x27;,&#x27;较大&#x27;,&#x27;大型&#x27;];
      function updatePlanner() {
        const modelFactor = Number(model.value);
        const effortFactor = Number(effort.value);
        const taskCount = Number(tasks.value);
        const sizeValue = Number(size.value);
        const daysLeft = 3.4;
        const basePerTask = 0.9;
        const daily = taskCount * basePerTask * modelFactor * effortFactor * (0.45 + sizeValue * 0.18);
        const total = daily * daysLeft;
        const end = clamp(Math.round(remaining - total), 0, 100);
        const safe = Math.max(1, Math.floor((remaining - 10) / (daysLeft * basePerTask * modelFactor * effortFactor * (0.45 + sizeValue * 0.18))));
        const risk = clamp(Math.round((total / Math.max(remaining,1)) * 45 - 8), 3, 96);
        const sustainable = end &gt;= 10;
        root.querySelector(&#x27;#ql-task-value&#x27;).textContent = `${taskCount} 个`;
        root.querySelector(&#x27;#ql-size-value&#x27;).textContent = sizeLabels[sizeValue - 1];
        root.querySelector(&#x27;#ql-daily-cost&#x27;).textContent = `${fmt1(daily)}%`;
        root.querySelector(&#x27;#ql-daily-range&#x27;).textContent = `区间 ${fmt1(daily * .7)}–${fmt1(daily * 1.4)}%`;
        root.querySelector(&#x27;#ql-end-remaining&#x27;).textContent = `${end}%`;
        root.querySelector(&#x27;#ql-risk-label&#x27;).textContent = `提前耗尽风险 ${risk}%`;
        root.querySelector(&#x27;#ql-safe-tasks&#x27;).textContent = `${safe} 个/天`;
        root.querySelector(&#x27;#ql-meter-fill&#x27;).style.width = `${clamp(total / remaining * 100, 0, 100)}%`;
        root.querySelector(&#x27;#ql-plan-status&#x27;).textContent = sustainable ? &#x27;可持续&#x27; : &#x27;可能提前耗尽&#x27;;
        root.querySelector(&#x27;#ql-plan-copy&#x27;).textContent = sustainable
          ? `这个组合预计可以坚持到重置，并保留约 ${end}% 额度。`
          : `这个组合预计消耗 ${Math.round(total)}%，建议降至每天 ${safe} 个任务或切换更轻量模型。`;
      }
      [model, effort, tasks, size].forEach(control =&gt; control.addEventListener(&#x27;input&#x27;, updatePlanner));

      updateOverview();
      updatePlanner();
      updateCountdown();
      setInterval(updateCountdown, 1000);
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
